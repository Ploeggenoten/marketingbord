<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ploeggenoten · Marketingbord</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#141a0b;--txt:#20260f;--steel:#3d6400;--glove:#6fa03c;--glove-ink:#ffffff;--paper:#eceee4;--col:#fbfcf8;--card:#ffffff;--line:#d7ddc8;--muted:#697256;--green:#2f8f5b;--red:#c0392b;--amber:#a86a1a;--disp:'Anton','Inter',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:url('board-bg.jpg') center/cover fixed no-repeat, var(--paper)}
body{color:var(--txt);font-family:var(--body);-webkit-font-smoothing:antialiased}
header.top{background:#20301a;color:#f6f7f1;padding:11px 18px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
/* ── NAV-TABS (3 fases) ── */
nav.fases{background:#20301a;border-bottom:1px solid #33421f;padding:0 18px;display:flex;gap:4px;overflow-x:auto}
.navtab{background:transparent;border:none;border-bottom:4px solid transparent;color:#9aa781;font-family:var(--disp);font-size:15px;letter-spacing:.06em;text-transform:uppercase;padding:12px 18px 10px;cursor:pointer;white-space:nowrap;display:flex;gap:8px;align-items:center}
.navtab:hover{color:#d3ecab}
.navtab.on{color:#c8f135;border-bottom-color:#c8f135}
.navtab .nbadge{font-family:var(--body);font-size:11px;font-weight:700;background:#3e4f2a;color:#d3ecab;border-radius:999px;padding:1px 8px}
.navtab.on .nbadge{background:#c8f135;color:#171d08}
.viewwrap{padding:16px 18px 40px;display:none;flex-direction:column;gap:12px}
/* ── CREATIE ── */
.cregrid{display:grid;grid-template-columns:minmax(240px,300px) 1fr;gap:12px;align-items:start}
@media(max-width:860px){.cregrid{grid-template-columns:1fr}}
.postgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.cre-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.bigbtn{background:var(--glove);color:#fff;border:none;border-radius:10px;padding:12px 16px;font-weight:600;font-size:14px;cursor:pointer;display:flex;gap:8px;align-items:center}
.bigbtn.sec{background:#fff;color:#2a3618;border:1px solid var(--line)}
.bigbtn:hover{filter:brightness(1.04)}
.fasechip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:999px;color:#fff;background:var(--fc,#9aa3b2)}
.qbtn{border:1px solid var(--line);background:#f4f6ee;color:#2a3618;border-radius:7px;font-size:11.5px;font-weight:600;padding:4px 9px;cursor:pointer}
.qbtn:hover{background:#e9eddc}
/* ── PRESTATIE ── */
.metatable td,.metatable th{white-space:nowrap}
.activatie{border:2px dashed #c4d09a;border-radius:12px;padding:18px;text-align:center;color:var(--muted);font-size:13.5px;line-height:1.6;background:#fbfcf5}
.activatie b{color:var(--txt)}
.syncnote{font-size:11px;color:var(--muted);margin-top:6px}
/* ── PLANNING ── */
.planrow{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #e8ebdd;font-size:13.5px}
.planrow:last-child{border-bottom:none}
.planrow .pd{font-variant-numeric:tabular-nums;font-weight:600;min-width:96px}
.planrow .pt{flex:1;font-weight:600}
.planrow.gemist .pd{color:var(--red)}
.aibtns{display:flex;gap:6px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:9px}
.brand span{font-size:12px;color:#9aa781}
.spacer{flex:1}.tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
select,input,button,textarea{font-family:var(--body);font-size:13px}
.field{background:#2b3a20;color:#f0f2ea;border:1px solid #3e4f2a;border-radius:8px;padding:8px 10px}
.field::placeholder{color:#9aa781}.field option{color:#0e1207}
.btn{background:var(--glove);color:var(--glove-ink);border:none;border-radius:8px;padding:9px 13px;font-weight:600;cursor:pointer}
.btn:hover{filter:brightness(1.05)}
.btn.ghost{background:transparent;border:1px solid #5b6544;color:#2a3618}
.top .btn.ghost{background:rgba(111,160,60,.16);border:1px solid #6fa03c;color:#d3ecab}
.top .btn.ghost:hover{background:rgba(111,160,60,.28)}
.btn.ghost.on{background:var(--glove);color:var(--glove-ink);border-color:var(--glove)}
/* ── DASH ── */
.dash{display:flex;gap:12px;padding:16px 18px;flex-wrap:wrap;align-items:stretch}
.panelbox{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.panelbox h4{margin:0 0 8px;font-family:var(--disp);font-weight:400;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--steel)}
.pijp{flex:1 1 220px}.wk{flex:2 1 380px}.mnd{flex:1 1 220px}
.big{font-family:var(--disp);font-weight:400;font-size:26px;line-height:1}
.sub{font-size:12px;color:var(--muted);margin-top:3px}
.split{display:flex;gap:14px;margin-top:9px;font-size:12px;flex-wrap:wrap}.split b{font-family:var(--disp);font-weight:400;font-size:16px}
.wgrid{display:flex;gap:8px;flex-wrap:wrap}
.wcell{background:#f2f4ea;border:1px solid var(--line);border-radius:9px;padding:7px 10px;min-width:86px;flex:1}
.wcell .n{font-family:var(--disp);font-weight:400;font-size:20px;line-height:1}
.wcell .l{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.03em}
.wcell .t{font-size:10.5px;color:#3a5416;margin-top:3px;line-height:1.35}
.wcell.today{background:#e4f1e9;border-color:#a8d0b6}
.chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px 11px;font-size:12px;display:inline-flex;gap:6px;align-items:center;margin:2px 4px 2px 0}
.chip b{font-family:var(--disp);font-weight:400}
.chip.alert{border-color:#e0a89f;background:#fbe2df;color:var(--red)}
.chip.warn{border-color:#e6c896;background:#faedd6;color:var(--amber)}
.kdot{display:inline-block;width:9px;height:9px;border-radius:3px}
/* ── BOARD ── */
.board{display:flex;gap:12px;padding:4px 18px 40px;overflow-x:auto;align-items:flex-start;min-height:54vh}
.colm{flex:0 0 262px;background:var(--col);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;max-height:calc(100vh - 290px)}
.chead{padding:11px 13px;border-top:5px solid var(--ph);border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:inherit;z-index:1}
.chead h3{font-family:var(--disp);font-weight:400;font-size:14px;letter-spacing:.05em;text-transform:uppercase;margin:0;color:#20260f}
.count{font-family:var(--disp);font-size:13px;color:#111;background:var(--ph);border-radius:999px;min-width:22px;height:20px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px}
.cbody{padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:46px}
.colm.drop .cbody{outline:2px dashed var(--glove);outline-offset:-6px;border-radius:8px}
.card{background:#fff;border:1px solid #d5dcc8;border-left:6px solid var(--kan,#9aa3b2);border-radius:10px;padding:10px 12px;cursor:grab;box-shadow:0 2px 7px rgba(0,0,0,.18);color:#232b17}
.card:active{cursor:grabbing}.drag{opacity:.4}
.card .nm{font-weight:600;font-size:14.5px;line-height:1.25;color:#171d0e}
.card .meta{display:flex;gap:5px;align-items:center;margin-top:6px;flex-wrap:wrap}
.tag{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;border:1px solid #cdd5bd;background:#f1f4ea;color:#4a5540}
.tag.kan{color:#fff;border:none;background:var(--kan)}
.tag.doel{background:#eef1e7;color:#5b6544}
.tag.warn2{background:#faedd6;border-color:#e6c896;color:#8a5a1a;cursor:help}
.chkrow{display:flex;flex-direction:column;gap:4px;background:#f4f6ee;border:1px solid var(--line);border-radius:9px;padding:9px 11px}
.chkrow .ci2{font-size:12px;display:flex;gap:7px;align-items:baseline}
.chkrow .ci2 b{font-weight:600}
.chkrow .ci2 small{color:var(--muted)}
.chkrow .ok{color:#1e6b3f}.chkrow .nee{color:#a86a1a}
.card .when{margin-top:7px;font-weight:600;font-size:13px;font-variant-numeric:tabular-nums;color:#26331a;background:#eef2e0;border:1px solid #bcc9a0;border-radius:8px;padding:3px 9px;display:inline-flex;gap:6px;align-items:center}
.card .when.vandaag{background:#2f8f5b;color:#fff;border-color:#2f8f5b}
.card .when.soon{background:#fbe6d2;border-color:#e0b076;color:#8a521a}
.card .when.gemist{background:#fbe2df;border-color:#e0a89f;color:#b0392b}
.card .when.ok{background:#dff0e4;border-color:#9fceb0;color:#1e6b3f}
.scriptrow{margin-top:7px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.scripttag{font-size:11px;font-weight:600;color:#2f6a8a;background:#e6eef4;border:1px solid #b8cfe0;border-radius:8px;padding:2px 9px}
.copybtn{border:1px solid #b8cfe0;background:#fff;color:#2f6a8a;border-radius:6px;font-size:10.5px;font-weight:700;padding:2px 8px;cursor:pointer}
.copybtn:hover{background:#e6eef4}
.res{margin-top:7px;display:flex;gap:5px;flex-wrap:wrap;font-size:11px;font-weight:600}
.res span{background:#f1f4ea;border:1px solid #cdd5bd;border-radius:6px;padding:2px 7px;color:#3a5416;font-variant-numeric:tabular-nums}
.learn{margin-top:7px;font-size:12px;color:#3a5416;background:#eef4e0;border:1px solid #c4d09a;border-radius:8px;padding:5px 9px;line-height:1.4}
.movebtn{display:none;margin-top:7px;width:100%;background:#f1f4ea;border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:11px;font-weight:600;color:#4a4f3a;cursor:pointer;text-align:left}
@media(hover:none),(max-width:600px){.movebtn{display:block}}
/* ── KALENDER ── */
#calwrap{padding:4px 18px 40px;display:none}
.calbox{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.calhead{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
.calhead h3{font-family:var(--disp);font-weight:400;font-size:17px;letter-spacing:.04em;text-transform:uppercase;margin:0;min-width:170px}
.calnav{background:#eef1e7;border:1px solid var(--line);border-radius:7px;font-size:14px;font-weight:700;padding:3px 11px;cursor:pointer;color:var(--txt)}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr)}
.caldow{padding:7px 9px;font-family:var(--disp);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line)}
.calcell{min-height:96px;border-bottom:1px solid #e6e9db;border-right:1px solid #e6e9db;padding:6px 7px;cursor:pointer;vertical-align:top}
.calcell:hover{background:#f6f8ef}
.calcell.out{background:#f4f5ee;color:#b0b59e}
.calcell.today{background:#e9f3ec}
.calcell .dn{font-weight:600;font-size:12px;color:var(--muted)}
.calcell.today .dn{color:#1e6b3f;font-weight:700}
.calpost{margin-top:4px;font-size:11px;font-weight:600;color:#fff;background:var(--kan,#9aa3b2);border-radius:6px;padding:2px 7px;line-height:1.35;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.calpost.done{opacity:.65}.calpost.missed{outline:2px solid #c0392b}
/* ── INZICHTEN ── */
#inzwrap{padding:4px 18px 40px;display:none;flex-direction:column;gap:12px}
.inzgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px;align-items:start}
.inzbox{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.inzbox h4{margin:0 0 10px;font-family:var(--disp);font-weight:400;font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--steel)}
.inzbox .toel{font-size:11.5px;color:var(--muted);margin:-6px 0 10px;line-height:1.45}
.itable{width:100%;border-collapse:collapse;font-size:13px}
.itable th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:6px 6px;border-bottom:1px solid var(--line)}
.itable td{padding:7px 6px;border-bottom:1px solid #e8ebdd;vertical-align:top}
.itable tr:last-child td{border-bottom:none}
.itable .rr{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.advies{border-left:4px solid var(--glove);background:#f4f8ec;border-radius:8px;padding:9px 12px;margin-bottom:8px;font-size:13px;line-height:1.5}
.advies b{display:block;font-size:13.5px;margin-bottom:1px}
.advies.warn{border-left-color:#d9a441;background:#fbf3e2}
.advies.rood{border-left-color:var(--red);background:#fbeae7}
.advies small{color:var(--muted);font-size:11px}
.gapviz{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid #e8ebdd;font-size:13px}
.gapviz:last-child{border-bottom:none}
.gapviz .gv{flex:1}.gapviz .gv b{font-size:13.5px}.gapviz .gv small{display:block;color:var(--muted);font-size:11px;margin-top:1px}
.gapbtn{background:var(--glove);color:#fff;border:none;border-radius:7px;font-size:11.5px;font-weight:600;padding:5px 10px;cursor:pointer;white-space:nowrap}
.ketenzin{font-size:13px;background:#eef4e0;border:1px solid #c4d09a;border-radius:8px;padding:8px 11px;margin-top:10px;line-height:1.5}
/* ── IDEE-MODAL ── */
.ideemodal{position:fixed;top:50%;left:50%;transform:translate(-50%,-46%);background:var(--col);border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.35);width:560px;max-width:94vw;max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
.ideemodal h2{font-family:var(--disp);font-weight:400;font-size:16px;margin:0;padding:14px 18px;border-bottom:1px solid var(--line);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.ideebody{padding:14px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.ideekaart{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.ideekaart .it{font-weight:600;font-size:14px}
.ideekaart .ih{font-size:12.5px;color:#2f6a8a;background:#e6eef4;border:1px solid #b8cfe0;border-radius:7px;padding:4px 9px;margin-top:6px;font-style:italic}
.ideekaart .im{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center}
.ideefoot{padding:11px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:space-between;align-items:center}
/* ── UTM ── */
.utmrow{display:flex;gap:6px;align-items:flex-end}
.utmrow label{flex:1}
.utmout{font-size:11px;color:var(--muted);word-break:break-all;background:#f2f4ea;border:1px solid var(--line);border-radius:7px;padding:6px 8px;margin-top:4px;display:none}
/* ── PANEL / SCRIM ── */
.scrim{position:fixed;inset:0;background:rgba(20,30,35,.4);display:none;z-index:5}.scrim.open{display:block}
.panel{position:fixed;top:0;right:0;height:100%;width:430px;max-width:94vw;background:var(--col);box-shadow:-8px 0 30px rgba(0,0,0,.18);transform:translateX(100%);transition:transform .22s;display:flex;flex-direction:column}
.scrim.open .panel{transform:translateX(0)}
.panel h2{font-family:var(--disp);font-weight:400;font-size:16px;margin:0;padding:16px 18px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.04em}
.pbody{padding:16px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
label.fl{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--muted);font-weight:600}
label.fl select,label.fl input,label.fl textarea{font-size:14px;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:9px 10px;background:#fff;font-family:var(--body)}
textarea{resize:vertical}
#f_script{min-height:150px;font-size:13.5px;line-height:1.5}
.pfoot{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.notehist{max-height:130px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.noteitem{background:#f2f4ea;border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:12.5px}
.noteitem .nt{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:2px}
.notehist:empty::after{content:'Nog geen notities';color:var(--muted);font-size:12px}
.resgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sectt{font-family:var(--disp);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--steel);margin:6px 0 -4px}
.updinfo{font-size:10px;color:var(--muted);font-style:italic}
/* ── KANALEN PANEL ── */
.krow2{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.krow2 input[type=color]{width:34px;height:26px;border:1px solid var(--line);border-radius:6px;padding:1px;background:#fff;cursor:pointer}
.krow2 .kn2{flex:1;font-weight:600}
.x{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 5px}
/* ── PHASE PICKER ── */
#phasescrim{z-index:10}
#phasepanel{top:auto;bottom:0;height:auto;max-height:72vh;width:100%;max-width:100%;transform:translateY(100%)}
#phasescrim.open #phasepanel{transform:translateY(0)}
#phaselist{padding:10px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.phopt{background:#f4f6ee;border:1px solid var(--line);border-radius:8px;padding:9px 13px;font-size:14px;font-weight:600;color:var(--txt);cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px}
.phopt .phc{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.phopt.cur{background:#e4f1e9;border-color:#a8d0b6}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#fff;color:#20260f;border:1px solid var(--line);box-shadow:0 8px 28px rgba(0,0,0,.22);padding:10px 20px;border-radius:99px;font-size:13.5px;font-weight:600;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:99;max-width:86vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ── MOBIEL (Bryan werkt vanaf zijn telefoon) ── */
nav.fases{position:sticky;top:0;z-index:4}
@media(max-width:640px){
  header.top{padding:8px 10px;gap:6px}
  .brand span{display:none}
  .tools{gap:6px;width:100%}
  #search{flex:1 1 110px;min-width:110px;width:auto!important}
  .btn{font-size:12.5px;padding:7px 10px}
  .field{font-size:16px;padding:7px 9px}
  .navtab{font-size:13px;padding:10px 12px 8px;gap:5px}
  .navtab .nbadge{font-size:10px;padding:1px 6px}
  .viewwrap{padding:10px 8px 30px;gap:9px}
  .inzbox{padding:11px 12px}
  .inzgrid{gap:9px}
  .itable{font-size:12px}
  .itable th,.itable td{padding:5px 4px}
  .calhead{flex-wrap:wrap;gap:6px;padding:9px 10px}
  .calhead h3{min-width:0;font-size:14px;flex:1}
  .calhead span{display:none}
  .calcell{min-height:52px;padding:3px 4px}
  .calcell .dn{font-size:10.5px}
  .calpost{font-size:0;line-height:0;width:9px;height:9px;padding:0;border-radius:50%;display:inline-block;margin:2px 2px 0 0}
  .panel{width:100vw;max-width:100vw}
  label.fl select,label.fl input,label.fl textarea{font-size:16px}
  .bigbtn{flex:1 1 auto;justify-content:center;padding:11px 10px;font-size:13.5px}
  .cre-actions{gap:6px}
  .wcell{min-width:66px;padding:5px 7px}
  .wcell .n{font-size:17px}
  .planrow{font-size:12.5px;gap:7px}
  .planrow .pd{min-width:74px}
  .postgrid{grid-template-columns:1fr 1fr;gap:7px}
  .card{padding:8px 9px}
  .card .nm{font-size:13px}
}
@media(max-width:420px){ .postgrid{grid-template-columns:1fr} }
/* ── LOGIN ── */

<script>
const SUPABASE_URL  = 'https://gyhrwjdlwamyjhxtdypw.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aHJ3amRsd2FteWpoeHRkeXB3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3ODgwMzUsImV4cCI6MjA5NzM2NDAzNX0.M2huzUfbYtcOqimYIkcuGW-6BCion4HqJVn7TxtkZ9c';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, { auth: { persistSession: false } });
let currentUser = null, currentProfile = null, rtChannel = null;

// ─── AUTH (zelfde patroon als pijplijnbord) ─────────────────────

  e.preventDefault();

  try { await sb.auth.signOut(); } catch(e) {}

let _appShowing = false;
async function initApp(user) {
  currentUser = user;
  document.getElementById('loginscreen').style.display = 'none';
  document.getElementById('app').style.display = '';
  const { data: prof } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  currentProfile = prof;
  document.getElementById('userinfo').textContent = prof?.naam || currentUser.email;
  await loadFromDB();
  refreshKanaalUI(); render();
  setupRealtime();
  metaAutoSync();
}
function showLogin() {
  _appShowing = false; currentUser = null; currentProfile = null;
  document.getElementById('loginscreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  if (rtChannel) { rtChannel.unsubscribe(); rtChannel = null; }
}
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
    if (_appShowing) return;
    _appShowing = true;
    await initApp(session.user);
  } else if (event === 'INITIAL_SESSION') {
    if (!session?.user) { showLogin(); return; }
    const { data, error } = await sb.auth.refreshSession();
    if (error || !data?.session) { showLogin(); return; }
  } else if (event === 'SIGNED_OUT' || !session?.user) {
    showLogin();
  }
});

// ─── STATE & CONSTANTEN ─────────────────────────────────────────
const FASES = [
  {k:'Idee',          c:'#9aa3b2'},
  {k:'Script klaar',  c:'#9575b8'},
  {k:'Ingepland',     c:'#d9a441'},
  {k:'Gepubliceerd',  c:'#3d9968'},
  {k:'Learnings',     c:'#4a9d9d'},
];
const state = { posts: [], kanalen: [], vacs: [], cands: [], fees: null, meta: null, besluiten: [] };
const VIEWS = ['prestatie','creatie','planning'];
let view = localStorage.getItem('mkt_view') || 'prestatie';
if (!VIEWS.includes(view)) view = {bord:'creatie', kalender:'planning', inzichten:'prestatie'}[view] || 'prestatie';
let calMaand = null; // 'YYYY-MM' van getoonde kalendermaand

function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function fmtD(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${d}-${m}-${y.slice(2)}`; }
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function kanaalKleur(naam){ const k = state.kanalen.find(x=>x.naam===naam); return k ? k.kleur : '#9aa3b2'; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2600); }

// ─── DATA MAPPING ───────────────────────────────────────────────
function rowToPost(r){
  return {
    id:r.id, titel:r.titel||'', kanaal:r.kanaal||'', format:r.format||'', doel:r.doel||'',
    fase:r.fase||'Idee', campagne:r.campagne||'', vacature:r.vacature||'', utm:r.utm||'', hook:r.hook||'', script:r.script||'',
    datum:r.publicatie_datum||'', tijd:r.publicatie_tijd||'', link:r.link||'',
    resultaat:(r.resultaat&&typeof r.resultaat==='object')?r.resultaat:{},
    learnings:r.learnings||'', notities:Array.isArray(r.notities)?r.notities:[],
    createdAt:r.created_at||'', _updatedBy:r.updated_by, _updatedAt:r.updated_at
  };
}
function postToRow(p){
  return {
    id:p.id, titel:p.titel, kanaal:p.kanaal||'', format:p.format||'', doel:p.doel||'',
    fase:p.fase, campagne:p.campagne||'', vacature:p.vacature||'', utm:p.utm||'', hook:p.hook||'', script:p.script||'',
    publicatie_datum:p.datum||null, publicatie_tijd:p.tijd||'', link:p.link||'',
    resultaat:p.resultaat||{}, learnings:p.learnings||'', notities:p.notities||[]
  };
}

// ─── LOAD / SAVE ────────────────────────────────────────────────
async function loadFromDB(){
  let attempts = 0, pR, kR;
  while (attempts < 3) {
    [pR,kR] = await Promise.all([ sb.from('mkt_posts').select('*'), sb.from('mkt_kanalen').select('*').order('volgorde') ]);
    if (!pR.error && !kR.error) break;
    attempts++; await new Promise(r=>setTimeout(r,800));
  }
  if (pR.error || kR.error) { toast('Fout bij laden — herlaad de pagina'); console.error(pR.error,kR.error); return; }
  state.posts   = (pR.data||[]).map(rowToPost);
  state.kanalen = (kR.data||[]);
  // Bord-data (zelfde Supabase): vacatures + kandidaten voor de keten-inzichten
  const [vR,cR] = await Promise.all([
    sb.from('vacatures').select('klant,functie,type,aangemaakt'),
    sb.from('candidates').select('id,bron,since,fase,geplaatst_op,klant,functie'),
  ]);
  state.vacs  = vR.error ? [] : (vR.data||[]);
  state.cands = cR.error ? [] : (cR.data||[]);
  // Fees (finance, RLS alleen Tjeerd — faalt stil voor de rest van het team)
  const fR = await sb.from('fin_placements').select('pipeline_candidate_id,fee_excl,concept');
  state.fees = fR.error ? null : (fR.data||[]);
  // Live Meta-cijfers (gevuld door de fase 2-Edge Function; tabel kan nog leeg/afwezig zijn)
  const mR = await sb.from('mkt_meta_stats').select('*').order('datum',{ascending:false}).limit(400);
  state.meta = mR.error ? null : (mR.data||[]);
  const bR = await sb.from('mkt_ad_besluiten').select('*').order('created_at',{ascending:false});
  state.besluiten = bR.error ? [] : (bR.data||[]);
}
async function upsertPost(p){
  const row = { ...postToRow(p), updated_by: currentUser?.id, updated_at: new Date().toISOString() };
  const { error } = await sb.from('mkt_posts').upsert(row);
  if (error) { console.error('upsertPost', error); toast('Opslaan mislukt'); }
}
async function deletePostDB(id){ await sb.from('mkt_posts').delete().eq('id', id); }

function setupRealtime(){
  if (rtChannel) return;
  rtChannel = sb.channel('mkt-v1')
    .on('postgres_changes', {event:'*', schema:'public', table:'mkt_posts'}, async () => { await loadFromDB(); render(); })
    .on('postgres_changes', {event:'*', schema:'public', table:'mkt_kanalen'}, async () => { await loadFromDB(); refreshKanaalUI(); render(); })
    .subscribe();
}

// ─── FILTERS & AFGELEIDEN ───────────────────────────────────────
function filtered(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const kf = document.getElementById('kfilter').value;
  return state.posts.filter(p => {
    if (kf !== '*' && p.kanaal !== kf) return false;
    if (q && !(p.titel+' '+p.script+' '+p.hook+' '+p.campagne).toLowerCase().includes(q)) return false;
    return true;
  });
}
function refreshKanaalUI(){
  const kf = document.getElementById('kfilter'); const cur = kf.value;
  kf.innerHTML = '<option value="*">Alle kanalen</option>' + state.kanalen.map(k=>`<option>${esc(k.naam)}</option>`).join('');
  if ([...kf.options].some(o=>o.value===cur)) kf.value = cur;
  const fk = document.getElementById('f_kanaal');
  fk.innerHTML = '<option value="">— kies kanaal —</option>' + state.kanalen.map(k=>`<option>${esc(k.naam)}</option>`).join('');
  const ff = document.getElementById('f_fase');
  ff.innerHTML = FASES.map(f=>`<option>${f.k}</option>`).join('');
  const fv = document.getElementById('f_vacature');
  fv.innerHTML = '<option value="">— geen specifieke vacature —</option>' +
    state.vacs.map(v=>{ const key=`${v.klant} — ${v.functie}`; return `<option value="${esc(key)}">${esc(key)}${v.type?' ('+esc(v.type)+')':''}</option>`; }).join('');
}

// ─── KAART (gedeeld door Creatie & Planning) ────────────────────
function cardHtml(p){
  const today = todayISO();
  let when = '';
  if (p.datum) {
    let cls = 'ok';
    if (p.fase === 'Ingepland') {
      if (p.datum === today) cls = 'vandaag';
      else if (p.datum < today) cls = 'gemist';
      else { const d2=new Date(); d2.setDate(d2.getDate()+2); cls = p.datum <= d2.toISOString().slice(0,10) ? 'soon' : 'ok'; }
    }
    when = `<div class="when ${cls}">${p.fase==='Ingepland'?'📅':'✔'} ${fmtD(p.datum)}${p.tijd?' · '+p.tijd.slice(0,5):''}</div>`;
  }
  const r = p.resultaat || {};
  const res = (p.fase==='Gepubliceerd'||p.fase==='Learnings') && (r.bereik||r.likes||r.leads||r.reacties)
    ? `<div class="res">${r.bereik?`<span>👁 ${Number(r.bereik).toLocaleString('nl-NL')}</span>`:''}${r.likes?`<span>❤ ${r.likes}</span>`:''}${r.reacties?`<span>💬 ${r.reacties}</span>`:''}${r.leads?`<span>🎯 ${r.leads} leads</span>`:''}</div>` : '';
  const script = p.script
    ? `<div class="scriptrow"><span class="scripttag">📝 script</span><button class="copybtn" data-copy="${p.id}">kopieer</button></div>` : '';
  const learn = p.fase==='Learnings' && p.learnings
    ? `<div class="learn">💡 ${esc(p.learnings.slice(0,110))}${p.learnings.length>110?'…':''}</div>` : '';
  const fase = FASES.find(f=>f.k===p.fase);
  return `<div class="card" data-id="${p.id}" style="--kan:${kanaalKleur(p.kanaal)};cursor:pointer">
    <div class="nm">${esc(p.titel)||'<i>zonder titel</i>'}</div>
    <div class="meta">
      <span class="fasechip" style="--fc:${fase?.c||'#9aa3b2'}">${esc(p.fase)}</span>
      ${p.kanaal?`<span class="tag kan" style="--kan:${kanaalKleur(p.kanaal)}">${esc(p.kanaal)}</span>`:''}
      ${p.format?`<span class="tag">${esc(p.format)}</span>`:''}
      ${p.doel?`<span class="tag doel">${esc(p.doel)}</span>`:''}
      ${p.campagne?`<span class="tag doel">🎯 ${esc(p.campagne)}</span>`:''}
      ${p.vacature?`<span class="tag doel" title="${esc(p.vacature)}">📌 ${esc(p.vacature.length>24?p.vacature.slice(0,24)+'…':p.vacature)}</span>`:''}
      ${p.notities.length?`<span class="tag">🗒 ${p.notities.length}</span>`:''}
      ${kanaalCoach(p)?`<span class="tag warn2" title="${esc(kanaalCoach(p))}">⚠ kanaal</span>`:''}
      ${baitCheck(p)?`<span class="tag warn2" title="Meta demoteert engagement-bait: ${esc(baitCheck(p))}. Meningsvragen mogen wél.">⚠ bait</span>`:''}
    </div>
    ${when}${script}${res}${learn}
    <div class="scriptrow">${quickBtns(p)}</div>
  </div>`;
}
function quickBtns(p){
  if (p.fase==='Idee') return `<button class="qbtn" data-q="${p.id}|Script klaar">✍️ script schrijven</button>`;
  if (p.fase==='Script klaar') return `<button class="qbtn" data-q="${p.id}|Ingepland">📅 inplannen</button>`;
  if (p.fase==='Ingepland') return `<button class="qbtn" data-q="${p.id}|Gepubliceerd">✔ gepubliceerd</button>`;
  if (p.fase==='Gepubliceerd') return `<button class="qbtn" data-q="${p.id}|Learnings">💡 learnings noteren</button>`;
  if (p.fase==='Learnings') return `<button class="qbtn" data-rm="${p.id}">🔁 remake</button>`;
  return '';
}
function bindCards(root){
  root.querySelectorAll('.card').forEach(c=>{
    c.onclick = e => {
      if (e.target.dataset.copy) { copyScript(e.target.dataset.copy); return; }
      if (e.target.dataset.q) { const [id,fase]=e.target.dataset.q.split('|'); quickFase(id,fase); return; }
      if (e.target.dataset.rm) { remakePost(e.target.dataset.rm); return; }
      openEdit(c.dataset.id);
    };
  });
}
function quickFase(id, fase){
  const p = state.posts.find(x=>x.id===id); if (!p) return;
  // Poortwachters lopen via het paneel: fase alvast voorgezet, opslaan valideert
  openEdit(id, { fase, ...(fase==='Gepubliceerd' && p.datum!==todayISO() ? {datum:todayISO()} : {}) });

// ─── RENDER: KALENDER (binnen Planning) ─────────────────────────
function renderCal(){
  const wrap = document.getElementById('planning');
  if (!document.getElementById('calgrid')) return;
  if (!calMaand) calMaand = todayISO().slice(0,7);
  const [y,m] = calMaand.split('-').map(Number);
  const eerste = new Date(y, m-1, 1);
  const start = new Date(eerste); start.setDate(1 - ((eerste.getDay()+6)%7)); // maandag vóór/op de 1e
  const today = todayISO();
  const P = filtered();
  document.getElementById('caltitle').textContent = eerste.toLocaleDateString('nl-NL',{month:'long',year:'numeric'});
  let html = ['ma','di','wo','do','vr','za','zo'].map(d=>`<div class="caldow">${d}</div>`).join('');
  const d = new Date(start);
  for (let i=0;i<42;i++){
    const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const out = d.getMonth() !== m-1;
    const items = P.filter(p=>p.datum===iso).sort((a,b)=>(a.tijd||'').localeCompare(b.tijd||''));
    html += `<div class="calcell${out?' out':''}${iso===today?' today':''}" data-dag="${iso}">
      <div class="dn">${d.getDate()}</div>
      ${items.map(p=>{
        const missed = p.fase==='Ingepland' && iso < today;
        const done = p.fase==='Gepubliceerd'||p.fase==='Learnings';
        return `<div class="calpost${done?' done':''}${missed?' missed':''}" data-id="${p.id}" title="${esc(p.titel)} · ${esc(p.kanaal)} · ${p.fase}" style="--kan:${kanaalKleur(p.kanaal)}">${p.tijd?p.tijd.slice(0,5)+' ':''}${esc(p.titel)}</div>`;
      }).join('')}
    </div>`;
    d.setDate(d.getDate()+1);
    if (i>=34 && d.getMonth()!==m-1 && d.getDay()===1) break; // stop na volle week buiten de maand
  }
  document.getElementById('calgrid').innerHTML = html;
  wrap.querySelectorAll('.calpost').forEach(cp=>{
    cp.onclick = e => { e.stopPropagation(); openEdit(cp.dataset.id); };
  });
  wrap.querySelectorAll('.calcell').forEach(cell=>{
    cell.onclick = () => openEdit(null, { datum: cell.dataset.dag, fase:'Ingepland' });
  });
}

// Kanaal (marketing) ↔ bron (pijplijnbord): Instagram+Facebook vallen onder 'Meta'
const KANAAL_BRON = { 'Instagram':'Meta', 'Facebook':'Meta', 'LinkedIn':'LinkedIn', 'TikTok':'TikTok' };
const PLACED_FASES = ['Contract getekend','Gestart'];
const PUB = p => p.fase==='Gepubliceerd' || p.fase==='Learnings';

function isoDaysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
function gem(arr){ return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function fmtN(n){ return Math.round(n).toLocaleString('nl-NL'); }

function ketenAnalyse(dagen=90){
  const cut = isoDaysAgo(dagen);
  const groepen = {};
  const G = naam => groepen[naam] ??= { posts:0, bereik:0, cands:0, plaatsingen:0, fee:0 };
  state.posts.filter(p=>PUB(p) && (p.datum||'') >= cut).forEach(p=>{
    const g = G(KANAAL_BRON[p.kanaal] || p.kanaal || 'Overig');
    g.posts++; g.bereik += Number(p.resultaat?.bereik)||0;
  });
  const feeMap = {};
  (state.fees||[]).forEach(f=>{ if (f.pipeline_candidate_id && !f.concept) feeMap[f.pipeline_candidate_id]=(feeMap[f.pipeline_candidate_id]||0)+(Number(f.fee_excl)||0); });
  state.cands.forEach(c=>{
    const bron = c.bron || 'Onbekend';
    if ((c.since||'') >= cut) G(bron).cands++;
    if ((c.geplaatst_op||'') >= cut && (PLACED_FASES.includes(c.fase)||c.fase==='Gestopt')) {
      G(bron).plaatsingen++; G(bron).fee += feeMap[c.id]||0;
    }
  });
  return groepen;
}

function watWerkt(){
  const pubs = state.posts.filter(p=>PUB(p) && Number(p.resultaat?.bereik)>0);
  const adviezen = [];
  if (pubs.length < 2) return { adviezen, pubs };
  const tot = gem(pubs.map(p=>Number(p.resultaat.bereik)));
  const perGroep = (keyFn) => {
    const m = {};
    pubs.forEach(p=>{ const k=keyFn(p); if(!k) return; (m[k] ??= []).push(Number(p.resultaat.bereik)); });
    return Object.entries(m).filter(([,v])=>v.length>=2).map(([k,v])=>({k, avg:gem(v), n:v.length})).sort((a,b)=>b.avg-a.avg);
  };
  const fm = perGroep(p=>p.format);
  if (fm.length>=2 && fm[0].avg >= 1.5*tot)
    adviezen.push({ico:'🏆', titel:`${fm[0].k} is je sterkste format`, txt:`Gem. ${fmtN(fm[0].avg)} bereik per post (${fm[0].n} posts) — ${(fm[0].avg/tot).toFixed(1)}× je gemiddelde van ${fmtN(tot)}. Plan hier meer van.`});
  const km = perGroep(p=>p.kanaal);
  if (km.length>=2 && km[0].avg >= 1.5*tot)
    adviezen.push({ico:'📣', titel:`${km[0].k} presteert het best`, txt:`Gem. ${fmtN(km[0].avg)} bereik (${km[0].n} posts). Zet je beste content eerst hier in.`});
  const dagen=['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  const dm = perGroep(p=>p.datum ? dagen[new Date(p.datum+'T12:00').getDay()] : '');
  if (dm.length>=2 && dm[0].avg >= 1.4*tot)
    adviezen.push({ico:'📅', titel:`${dm[0].k.charAt(0).toUpperCase()+dm[0].k.slice(1)} is je beste dag`, txt:`Posts op ${dm[0].k} halen gem. ${fmtN(dm[0].avg)} bereik (${dm[0].n} posts). Plan je toppers op die dag.`});
  const met = pubs.filter(p=>/[0-9€]/.test(p.hook||'')), zonder = pubs.filter(p=>!/[0-9€]/.test(p.hook||''));
  if (met.length>=2 && zonder.length>=2) {
    const a=gem(met.map(p=>Number(p.resultaat.bereik))), b=gem(zonder.map(p=>Number(p.resultaat.bereik)));
    if (a >= 1.3*b) adviezen.push({ico:'💶', titel:'Cijfers in je hook werken', txt:`Hooks met een getal of €-bedrag halen gem. ${fmtN(a)} bereik vs ${fmtN(b)} zonder (+${Math.round((a/b-1)*100)}%). Noem salaris of toeslag in de eerste zin.`});
    else if (b >= 1.3*a) adviezen.push({ico:'🔎', titel:'Cijfer-hooks blijven achter', txt:`Hooks zónder getal doen het bij jou beter (${fmtN(b)} vs ${fmtN(a)}). Test verhalende hooks.`});
  }
  const leadKing = pubs.filter(p=>Number(p.resultaat?.leads)>0).sort((a,b)=>b.resultaat.leads-a.resultaat.leads)[0];
  if (leadKing) adviezen.push({ico:'🎯', titel:`Meeste leads: "${leadKing.titel}"`, txt:`${leadKing.resultaat.leads} leads via ${leadKing.kanaal}${leadKing.format?' ('+leadKing.format+')':''}. Maak hier een vervolg of remake van.`});
  return { adviezen, pubs };
}

function vacatureRadar(dagen=14){
  const cut = isoDaysAgo(dagen);
  return state.vacs.map(v=>{
    const key = `${v.klant} — ${v.functie}`;
    const content = state.posts.filter(p=>p.vacature===key && p.fase!=='Idee');
    const recent = content.some(p=>(p.datum||'') >= cut || ['Script klaar','Ingepland'].includes(p.fase));
    const dgnOpen = v.aangemaakt ? Math.floor((Date.now()-new Date(v.aangemaakt))/864e5) : null;
    return { key, v, dgnOpen, nContent: content.length, gap: !recent };
  }).filter(x=>x.gap).sort((a,b)=>(b.dgnOpen||0)-(a.dgnOpen||0));
}

function runway(){
  const pubs28 = state.posts.filter(p=>PUB(p) && (p.datum||'') >= isoDaysAgo(28)).length;
  const tempoWk = pubs28/4;
  const voorraad = state.posts.filter(p=>p.fase==='Idee'||p.fase==='Script klaar').length;
  const gepland = state.posts.filter(p=>p.fase==='Ingepland' && (p.datum||'') >= todayISO()).length;
  return { tempoWk, voorraad, gepland, weken: tempoWk>0 ? (voorraad+gepland)/tempoWk : null };
}

function adStats(rows){
  const s = { spend:0, imp:0, kliks:0, leads:0, bereik:0 };
  rows.forEach(r=>{ s.spend+=Number(r.uitgegeven)||0; s.imp+=Number(r.impressies)||0; s.kliks+=Number(r.kliks)||0; s.leads+=Number(r.leads)||0; s.bereik+=Number(r.bereik)||0; });
  s.cpc = s.kliks? s.spend/s.kliks : null;
  s.ctr = s.imp? s.kliks/s.imp : null;
  s.cpl = s.leads? s.spend/s.leads : null;
  return s;
}

    const s7 = adStats(rows.filter(r=>r.datum>=d7));
    const sPrev = adStats(rows.filter(r=>r.datum>=d14 && r.datum<d7));
    const s30 = adStats(rows);
    const s2 = adStats(rows.filter(r=>r.datum>=d2));
    const besluit = state.besluiten.find(b=>b.advertentie===advertentie && b.campagne===campagne && b.status==='open');

        acties: s2.spend>1 ? ['adsmanager'] : ['bevestig'] });
      continue;
    }
    if (besluit?.besluit==='negeer' && (Date.now()-new Date(besluit.created_at))/864e5 < 7) continue;
    if (s7.spend < 20) continue; // te weinig data om over te oordelen

    }
    if (s7.ctr!=null && acc30.ctr && s7.ctr < 0.6*acc30.ctr){
      uit.push({ sev:'geel', campagne, advertentie, titel:'CTR blijft achter', txt:`CTR ${(s7.ctr*100).toFixed(2)}% vs ${(acc30.ctr*100).toFixed(2)}% accountgemiddelde — de creative pakt niet. ${cijfers}`, acties:['stop','negeer'] });
      continue;
    }
    if (sPrev.spend>0 && s7.spend > 0.8*sPrev.spend && sPrev.bereik>0 && s7.bereik < 0.6*sPrev.bereik){
      uit.push({ sev:'geel', campagne, advertentie, titel:'Bereik droogt op bij gelijk budget', txt:`Bereik ${fmtN(s7.bereik)} vs ${fmtN(sPrev.bereik)} vorige week — publiek raakt verzadigd. ${cijfers}`, acties:['stop','negeer'] });
      continue;
    }
    // 🟢 winnaar
    if (s7.cpl && acc30.cpl && s7.cpl < 0.6*acc30.cpl && s7.leads>=3){
      uit.push({ sev:'groen', campagne, advertentie, titel:'Winnaar — overweeg opschalen', txt:`€${s7.cpl.toFixed(0)}/lead, ver onder het gemiddelde van €${acc30.cpl.toFixed(0)}. ${cijfers}`, acties:['negeer'] });
    }
  }
  const orde = { rood:0, geel:1, groen:2 };
  return uit.sort((a,b)=>orde[a.sev]-orde[b.sev]);
}

// ─── DAGSTART (wat moet Bryan vandaag doen?) ────────────────────
function dagstartHtml(){
  const today = todayISO();
  const P = state.posts;
  const items = [];
  P.filter(p=>p.fase==='Ingepland' && p.datum===today).forEach(p=>
    items.push({ico:'📤', txt:`Publiceren vandaag${p.tijd?' om '+p.tijd.slice(0,5):''}: <b>${esc(p.titel)}</b> (${esc(p.kanaal)})`, open:p.id}));
  P.filter(p=>p.fase==='Ingepland' && p.datum && p.datum<today).forEach(p=>
    items.push({ico:'⏰', txt:`Over datum (${fmtD(p.datum)}): <b>${esc(p.titel)}</b> — publiceren of verzetten`, open:p.id, rood:true}));
  P.filter(p=>PUB(p) && p.datum && p.datum<=isoDaysAgo(3) && !(Number(p.resultaat?.bereik)>0)).slice(0,3).forEach(p=>
    items.push({ico:'📊', txt:`Resultaten invullen: <b>${esc(p.titel)}</b>`, open:p.id}));
  const wh = adWaakhond().filter(a=>a.sev==='rood').length;
  if (wh) items.push({ico:'🐕', txt:`<b>${wh} advertentie${wh>1?'s':''}</b> met een rood waakhond-advies — beoordeel stopzetten`, goto:'prestatie', rood:true});
  const gaten = vacatureRadar().length;
  if (gaten) items.push({ico:'📌', txt:`${gaten} open vacature${gaten>1?'s':''} zonder content — zie radar hieronder`});
  return `<div class="inzbox"><h4>☀️ Vandaag</h4>
    ${items.length ? items.map(i=>`<div class="planrow${i.rood?' gemist':''}" ${i.open?`data-open="${i.open}"`:''} ${i.goto?`data-goto="${i.goto}"`:''} style="cursor:pointer"><span>${i.ico}</span><span class="pt">${i.txt}</span></div>`).join('')
      : '<div class="toel" style="margin:0">✅ Geen urgente acties — mooi moment om aan nieuwe content te werken.</div>'}
  </div>`;
}

// ─── VIEW 3: PLANNING ───────────────────────────────────────────
function renderPlanning(){
  const el = document.getElementById('planning');
  const P = filtered();
  const today = todayISO();
  const gepland = P.filter(p=>p.fase==='Ingepland').sort((a,b)=>(a.datum||'9999').localeCompare(b.datum||'9999'));
  const gemist = gepland.filter(p=>p.datum && p.datum<today);
  const recent = P.filter(p=>PUB(p)).sort((a,b)=>(b.datum||'').localeCompare(a.datum||'')).slice(0,8);
  // komende 7 dagen strip
  let wk='';
  for (let i=0;i<7;i++){
    const d=new Date(); d.setDate(d.getDate()+i);
    const iso=d.toISOString().slice(0,10);
    const dag=['zo','ma','di','wo','do','vr','za'][d.getDay()];
    const its=P.filter(p=>p.datum===iso && (p.fase==='Ingepland'||PUB(p)));
    wk+=`<div class="wcell${i===0?' today':''}"><div class="n">${its.length||'·'}</div><div class="l">${dag} ${fmtD(iso).slice(0,5)}</div>${its.slice(0,3).map(p=>`<div class="t"><span class="kdot" style="background:${kanaalKleur(p.kanaal)}"></span> ${esc(p.titel.slice(0,22))}</div>`).join('')}</div>`;
  }
  // Cadans-doelen per kanaal (week = ma t/m zo)
  const nu = new Date(); const ws = new Date(nu); ws.setDate(nu.getDate()-((nu.getDay()+6)%7));
  const wsIso = ws.toISOString().slice(0,10);
  const metDoel = state.kanalen.filter(k=>Number(k.doel_pw)>0);
  const cadansHtml = metDoel.length ? metDoel.map(k=>{
    const n = state.posts.filter(p=>p.kanaal===k.naam && (p.datum||'')>=wsIso && (p.fase==='Ingepland'||PUB(p))).length;
    const pct = Math.min(100, Math.round(n/k.doel_pw*100));
    return `<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12.5px;font-weight:600"><span><span class="kdot" style="background:${k.kleur}"></span> ${esc(k.naam)}</span><span>${n}/${k.doel_pw}${n>=k.doel_pw?' ✓':''}</span></div>
      <div style="height:7px;border-radius:4px;background:#e2e6d6;overflow:hidden;margin-top:3px"><i style="display:block;height:100%;width:${pct}%;background:${n>=k.doel_pw?'#2f8f5b':'#6fa03c'}"></i></div></div>`;
  }).join('') : `<div class="toel" style="margin:0">Stel per kanaal een doel in (posts per week) via ⚙ Kanalen — dan zie je hier je voortgang.</div>`;
  el.innerHTML = `
  <div class="inzgrid" style="grid-template-columns:2fr 1fr">
    <div class="inzbox"><h4>Komende 7 dagen</h4><div class="wgrid">${wk}</div></div>
    <div class="inzbox"><h4>🎯 Cadans deze week</h4>${cadansHtml}</div>
  </div>
  <div class="calbox">
    <div class="calhead">
      <h3 id="caltitle"></h3>
      <button class="calnav" id="calprev">‹</button>
      <button class="calnav" id="calvandaag">Vandaag</button>
      <button class="calnav" id="calnext">›</button>
      <span style="font-size:11.5px;color:var(--muted)">Klik op een dag om in te plannen · klik op een post om te bewerken</span>
    </div>
    <div class="calgrid" id="calgrid"></div>
  </div>
  <div class="inzgrid">
    <div class="inzbox"><h4>📅 Agenda — ingepland (${gepland.length})</h4>
      ${gemist.length?`<div class="advies rood"><b>⏰ ${gemist.length} over datum</b>Publiceer alsnog of kies een nieuwe datum.</div>`:''}
      ${gepland.map(p=>`<div class="planrow${p.datum&&p.datum<today?' gemist':''}" data-open="${p.id}" style="cursor:pointer"><span class="pd">${fmtD(p.datum)||'—'}${p.tijd?' '+p.tijd.slice(0,5):''}</span><span class="kdot" style="background:${kanaalKleur(p.kanaal)}"></span><span class="pt">${esc(p.titel)}</span><button class="qbtn" data-q="${p.id}|Gepubliceerd">✔</button></div>`).join('') || '<div class="toel" style="margin:0">Niets ingepland — plan vanuit de kalender of Content Creatie.</div>'}
    </div>
    <div class="inzbox"><h4>✔ Recent gepubliceerd</h4>
      ${recent.map(p=>`<div class="planrow" data-open="${p.id}" style="cursor:pointer"><span class="pd">${fmtD(p.datum)||'—'}</span><span class="kdot" style="background:${kanaalKleur(p.kanaal)}"></span><span class="pt">${esc(p.titel)}</span>${Number(p.resultaat?.bereik)>0?`<small style="color:var(--muted)">👁 ${fmtN(p.resultaat.bereik)}</small>`:'<small style="color:#a86a1a">📊 resultaten?</small>'}</div>`).join('') || '<div class="toel" style="margin:0">Nog niets gepubliceerd.</div>'}
    </div>
  </div>`;
  renderCal();
  el.querySelectorAll('[data-open]').forEach(r=>r.onclick = e => {
    if (e.target.dataset.q) { const [id,fase]=e.target.dataset.q.split('|'); quickFase(id,fase); return; }
    openEdit(r.dataset.open);
  });
  el.querySelector('#calprev').onclick = () => { const [y,m]=calMaand.split('-').map(Number); const d=new Date(y,m-2,1); calMaand=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; renderCal(); };
  el.querySelector('#calnext').onclick = () => { const [y,m]=calMaand.split('-').map(Number); const d=new Date(y,m,1); calMaand=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; renderCal(); };
  el.querySelector('#calvandaag').onclick = () => { calMaand = todayISO().slice(0,7); renderCal(); };
}

document.getElementById('f_save').onclick = async () => {
  const g = el => document.getElementById(el).value.trim();

  if (!titel) { toast('Titel is verplicht'); return; }
  const fase = g('f_fase');

    id:'m'+Date.now()+Math.random().toString(36).slice(2,6), notities:[], resultaat:{}, createdAt:new Date().toISOString()
  };

  p.datum=datum; p.tijd=g('f_tijd'); p.link=g('f_link');

function renderKanalen(){
  document.getElementById('klist').innerHTML = state.kanalen.map(k=>{
    const inUse = state.posts.some(p=>p.kanaal===k.naam);
    return `<div class="krow2">
      <input type="color" value="${k.kleur}" data-kleur="${esc(k.naam)}">
      <span class="kn2">${esc(k.naam)}</span>
      <label style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px">doel/wk
        <input type="number" min="0" max="21" value="${Number(k.doel_pw)||0}" data-doelpw="${esc(k.naam)}" style="width:50px;border:1px solid var(--line);border-radius:6px;padding:4px 6px"></label>
      ${inUse ? `<span style="font-size:11px;color:var(--muted)">${state.posts.filter(p=>p.kanaal===k.naam).length} posts</span>`
              : `<button class="x" data-delk="${esc(k.naam)}" title="Verwijderen">✕</button>`}
    </div>`;
  }).join('') || '<p style="font-size:13px;color:var(--muted)">Nog geen kanalen — voeg er hieronder een toe.</p>';
  document.querySelectorAll('#klist input[type=color]').forEach(inp=>{
    inp.onchange = async () => {
      await sb.from('mkt_kanalen').update({kleur: inp.value}).eq('naam', inp.dataset.kleur);
      const k = state.kanalen.find(x=>x.naam===inp.dataset.kleur); if (k) k.kleur = inp.value;
      render(); toast('Kleur aangepast');
    };
  });
  document.querySelectorAll('#klist [data-doelpw]').forEach(inp=>{
    inp.onchange = async () => {
      const { error } = await sb.from('mkt_kanalen').update({doel_pw: Number(inp.value)||0}).eq('naam', inp.dataset.doelpw);
      if (error) { toast('Doel opslaan mislukt — kolom doel_pw nog niet aangemaakt?'); console.error(error); return; }
      const k = state.kanalen.find(x=>x.naam===inp.dataset.doelpw); if (k) k.doel_pw = Number(inp.value)||0;
      toast('🎯 Doel opgeslagen');
    };
  });
  document.querySelectorAll('#klist [data-delk]').forEach(b=>{
    b.onclick = async () => {
      await sb.from('mkt_kanalen').delete().eq('naam', b.dataset.delk);
      state.kanalen = state.kanalen.filter(k=>k.naam!==b.dataset.delk);
      refreshKanaalUI(); renderKanalen(); render();
    };
  });
}
document.getElementById('manage').onclick = () => { renderKanalen(); document.getElementById('mscrim').classList.add('open'); };
document.getElementById('m_close').onclick = () => document.getElementById('mscrim').classList.remove('open');
document.getElementById('mscrim').onclick = e => { if (e.target.id==='mscrim') document.getElementById('mscrim').classList.remove('open'); };
document.getElementById('m_addk').onclick = async () => {
  const naam = document.getElementById('m_knaam').value.trim();
  if (!naam) return;
  const kleur = document.getElementById('m_kkleur').value;
  const volgorde = (state.kanalen.at(-1)?.volgorde || 0) + 1;
  const { error } = await sb.from('mkt_kanalen').upsert({naam, kleur, volgorde});
  if (error) { toast('Toevoegen mislukt'); return; }
  state.kanalen.push({naam, kleur, volgorde});
  document.getElementById('m_knaam').value = '';
  refreshKanaalUI(); renderKanalen(); render();
};

// ─── UTM-BOUWER ─────────────────────────────────────────────────
function slug(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40); }
document.getElementById('f_utmgen').onclick = () => {
  let base = document.getElementById('f_utmbase').value.trim();
  if (!base) { toast('Vul eerst de doelpagina in'); return; }
  if (!/^https?:\/\//.test(base)) base = 'https://' + base;
  localStorage.setItem('mkt_utmbase', base);
  const kanaal = document.getElementById('f_kanaal').value || 'social';
  const camp = document.getElementById('f_campagne').value || document.getElementById('f_titel').value || 'post';
  const u = new URL(base);
  u.searchParams.set('utm_source', slug(kanaal));
  u.searchParams.set('utm_medium', 'social');
  u.searchParams.set('utm_campaign', slug(camp));
  u.searchParams.set('utm_content', slug(document.getElementById('f_titel').value)||'post');
  const uo = document.getElementById('f_utmout');
  uo.textContent = u.toString(); uo.style.display = 'block';
  navigator.clipboard.writeText(u.toString()).then(()=>toast('🔗 UTM-link gemaakt en gekopieerd'));
};

}
